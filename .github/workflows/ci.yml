name: CI

on:
  pull_request:
  push:
    branches: [main]

# Newer pushes to the same ref supersede in-flight runs (e.g. a PR force-push).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repo. On a finding gitleaks still
# exits non-zero and fails the job — that's the outcome we want. We deliberately
# withhold `pull-requests: write`, so gitleaks' optional "post a summary comment"
# step just errors harmlessly instead of the action gaining write scope on a
# public repo. The blocking signal is the failed check, not a PR comment.
permissions:
  contents: read

jobs:
  # One job per concern so each shows as its own PR check (and can be required
  # independently in branch protection). They share the same setup; the small
  # duplication buys clearer, granular signal. pnpm version is read from
  # package.json "packageManager" — don't pin it in action-setup or it errors.
  static:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Runs the unit suite and prints the advisory coverage report in one pass —
      # no thresholds, so it fails only on a test failure (coverage is advisory
      # per ADR-0011/0012, not a gate).
      - run: pnpm test:coverage

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    # Ephemeral Postgres (ADR-0004). The service creates the test database; the
    # suite's globalSetup runs `prisma migrate deploy` against it.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fast_expense_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      # Throwaway CI-only creds (match the service above).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fast_expense_tracker_test?schema=public
      DATABASE_URL_UNPOOLED: postgresql://postgres:postgres@localhost:5432/fast_expense_tracker_test?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration

  secret-guards:
    name: Secret guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan every commit, not just the tip.
          fetch-depth: 0
      - name: Guard against committed .env files
        run: |
          tracked=$(git ls-files | grep -E '(^|/)\.env' | grep -v '\.env\.example$' || true)
          if [ -n "$tracked" ]; then
            echo "::error::Tracked env file(s) other than .env.example detected:"
            echo "$tracked"
            exit 1
          fi
          echo "OK — no stray .env files tracked."
      - name: Scan for secret values (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          # No GITLEAKS_LICENSE needed — gitleaks-action is free for public repos.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
